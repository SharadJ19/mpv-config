# Config behavior
use-filedir-conf                     # Load local mpv.conf if available (per-folder overrides)

# Playback settings
volume=80                            # Set default playback volume to 80%
keep-open=yes                        # Keep window open after playback ends
autocreate-playlist=same             # Autoload same-type files from current directory into playlist
save-watch-history                   # Save played files to watch history
write-filename-in-watch-later-config # Include filename as comment in watch_later config files
ignore-path-in-watch-later-config    # Use only filename (no full path) in watch_later list

# Video settings
hwdec=d3d11va                        # Use hardware decoding on Windows (DirectX 11)
border=no                            # Disable window border (cleaner fullscreen/windowed view)
ontop=yes                            # Always keep MPV window above others

# Subtitle settings
slang=en                             # Preferred subtitle language: English
blend-subtitles=yes                  # Blend soft subs into video for styling support
sub-font="Inter SemiBold"            # Sans-serif font for high readability
sub-font-size=42                     # Font size tuned for 1080p on a 14" screen
sub-color="#FFFFFF"                  # White subtitle text
sub-border-color="#000000"           # Black outline for max contrast
sub-border-size=2.5                  # Outline thickness (in scaled pixels)
sub-shadow-offset=1.5                # Drop shadow offset (helps against complex backgrounds)
sub-shadow-color="#80000000"         # Transparent black shadow (ARGB format)
sub-pos=95                           # Place subtitles 5% above bottom of screen

# OSD (On Screen Display)
osd-font="Inter SemiBold"            # Font for MPV’s on-screen messages (volume, seek bar, etc.)

# Screenshots
screenshot-format=jpg                # Save screenshots as JPEGs
screenshot-jpeg-quality=70           # JPEG quality (0–100)
screenshot-directory=~/Downloads     # Default screenshot save path
screenshot-template="%F-%P"          # Screenshot filename = filename + playback time
