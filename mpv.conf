profile=fast
hwdec=auto
use-filedir-conf
save-position-on-quit=yes

geometry=100%:100%
autofit=40%x40%
border=no

osc=no
osd-bar=no
osd-font='Netflix Sans Medium'

volume=100
volume-max=200

alang=ja,jp,jpn,en,eng,unknown,und
slang=en,eng,en-US,eng-US

sub-font='Netflix Sans Medium'
sub-font-size=42
sub-color='#FFFDF8'
sub-outline-color='#101010'
sub-outline-size=2.35
sub-back-color='#75000000'
sub-shadow-offset=0.70
sub-margin-x=95
sub-margin-y=48

#sub-fonts-dir=/storage/emulated/0/Android/media/is.xyz.mpv/fonts

screenshot-directory=~/Downloads

watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y
