# Performance
hwdec=auto

# Core Playback
volume=80
keep-open=yes
save-watch-history
write-filename-in-watch-later-config
ignore-path-in-watch-later-config
use-filedir-conf

# Window/UI
border=no
ontop=yes

# Subtitles
slang=en
blend-subtitles=yes
sub-font="Source Sans 3"
sub-font-size=50
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-border-size=1.8
sub-shadow-color="#000000"
sub-shadow-offset=2.0
sub-margin-y=80

# OSD
osc=no
osd-font="Source Sans 3"

# Screenshots
screenshot-format=jpg
screenshot-jpeg-quality=70
screenshot-directory=~/Downloads
screenshot-template="%F-%P"
