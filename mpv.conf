# Volume and Playback Behavior
volume=80
keep-open=yes
autocreate-playlist=same
save-watch-history
write-filename-in-watch-later-config
ignore-path-in-watch-later-config

# Subtitle Settings
slang=en
blend-subtitles=yes
sub-font='Roboto'

# OSD (On-Screen Display)
osd-font='JetBrains Mono'

# Video Output and Decoding
hwdec=d3d11va
border=no

# Screenshots
screenshot-format=jpg
screenshot-jpeg-quality=70
screenshot-directory=~/Downloads
screenshot-template="%F-%P"

# Use directory-specific config if available
use-filedir-conf
